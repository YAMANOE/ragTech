# ─────────────────────────────────────────────────────────────────────────────
# Jordanian Legislation Topic Taxonomy
# config/topics.yaml
#
# Structure:
#   - id:          unique slug (used as topic_id base)
#   - name_ar:     Arabic label displayed to users
#   - name_en:     English label
#   - level:       1 = primary category, 2 = sub-category
#   - parent:      parent topic id (null for top-level)
#   - keywords_ar: list of Arabic keyword/phrase patterns for rule-based matching
#                  Patterns are matched against normalized full text (regex, re.search)
#
# Matching logic:
#   - Match against: title_ar + preamble_text + first 1000 chars of body
#   - Confidence = (matched_keywords / total_keywords) * base_score
#   - Title match boosts confidence by +0.2
#   - Threshold: 0.40 for inclusion, highest = primary topic
# ─────────────────────────────────────────────────────────────────────────────

